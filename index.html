<!DOCTYPE html>
<html>
<head>
<title>BFHL Challenge</title>

<style>
body {
  font-family: Arial;
  padding: 20px;
}
textarea {
  width: 300px;
  height: 100px;
}
button {
  padding: 10px;
  margin-top: 10px;
}
pre {
  background: #f4f4f4;
  padding: 10px;
  margin-top: 20px;
}
</style>

</head>

<body>

<h2>Enter data</h2>

<textarea id="input">A->B,A->C,B->D</textarea><br>

<button onclick="send()">Submit</button>

<pre id="output"></pre>

<script>
async function send() {
  try {
    const input = document.getElementById("input").value.split(",");

    const res = await fetch("http://127.0.0.1:3000/bfhl", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ data: input })
    });

    const data = await res.json();

    document.getElementById("output").innerText =
      JSON.stringify(data, null, 2);

  } catch (err) {
    document.getElementById("output").innerText =
      "Error: " + err;
  }
}
</script>

</body>
</html>
